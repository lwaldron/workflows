name: Canary Check

# Runs on a weekly schedule and on-demand to verify that bioccheck.yml
# executes correctly end-to-end against the Bioconductor container tag derived from the branch (main => devel).
# Uses error_on: "never" so expected BiocCheck notes from this stub package
# (no vignettes, no NEWS, etc.) do not cause a false failure.

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  canary:
    permissions:
      pages: write
      id-token: write
    uses: ./.github/workflows/bioccheck.yml
    with:
      error_on: 'never'
